<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Mini AI Chat</title>

<style>
body{
    background:#1b1b1b;
    color:white;
    font-family:Arial;
    margin:20px;
}

#chat{
    width:100%;
    height:350px;
    border:2px solid #555;
    overflow-y:auto;
    padding:10px;
    margin-bottom:10px;
    background:#2d2d2d;
}

.user{
    color:#66ccff;
}

.ai{
    color:#66ff66;
}

input{
    width:75%;
    padding:8px;
}

button{
    padding:8px 15px;
}
</style>

</head>
<body>

<h2>Mini AI Chat</h2>

<div id="chat"></div>

<input id="entry" placeholder="พิมพ์ข้อความ...">
<button onclick="send()">ส่ง</button>

<script>

const knowledge = {
    "สวัสดี":"สวัสดี มีอะไรให้ช่วย?",
    "ชื่อ":"ฉันเป็น AI จำลอง",
    "กินข้าว":"ยังเลย นายล่ะ",
    "เป็นไง":"ก็โอเคนะ",
    "บาย":"บาย ไว้คุยกันใหม่"
};

const randomAnswer = [
    "อืม...",
    "จริงเหรอ?",
    "เล่าต่อสิ",
    "เข้าใจแล้ว",
    "น่าสนใจดี",
    "โอเค",
    "555",
    "ฉันไม่แน่ใจนะ"
];

function aiReply(text){

    text = text.toLowerCase();

    for(let key in knowledge){
        if(text.includes(key)){
            return knowledge[key];
        }
    }

    return randomAnswer[Math.floor(Math.random()*randomAnswer.length)];
}

function addMessage(name,msg,cls){

    let p=document.createElement("p");
    p.className=cls;
    p.innerHTML="<b>"+name+":</b> "+msg;

    document.getElementById("chat").appendChild(p);

    document.getElementById("chat").scrollTop=
    document.getElementById("chat").scrollHeight;
}

function send(){

    let box=document.getElementById("entry");
    let text=box.value.trim();

    if(text=="") return;

    addMessage("You",text,"user");

    box.value="";

    setTimeout(function(){

        let reply=aiReply(text);

        addMessage("AI",reply,"ai");

    },500);

}

document.getElementById("entry").addEventListener("keydown",function(e){
    if(e.key=="Enter"){
        send();
    }
});

</script>

</body>
</html>
