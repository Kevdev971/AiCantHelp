<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="style.css"/>
  <title>Chat!</title>
</head>
<body>
  <h1>
    chatGpt(Knowbase)
  </h1>
  <h1>ตัวอย่าง</h1>
  <h5>Tester: วาดรูปควย 84 ให่หน่อย</h5>
  <h5>chatgpt: พ่อมึงอะ</h5>
  <h2>มืงตอบตอเลย และ มึงคือ user</h2>
  <div id=chat><p>Chat in</p></div>
  <input id=entey></input>
  <button onclick="kk()">ENTER</button>
</body>
</html>

<script>
function getReply(text) {
    text = text.toLowerCase();

    if (text.includes("สวัสดี")) {
        return "สวัสดี มีอะไรให้ช่วย?";
    }

    if (text.includes("ชื่อ")) {
        return "ฉันเป็น User จำลอง";
    }

    if (text.includes("ทำอะไร")) {
        return "ก็นั่งรอคุยกับนายอยู่นี่แหละ";
    }

    if (text.includes("บาย")) {
        return "บาย เจอกันใหม่";
    }

    const random = [
        "อืม...",
        "จริงเหรอ?",
        "เล่าต่อสิ",
        "น่าสนใจนะ",
        "แล้วไงต่อ?",
        "โอเค เข้าใจแล้ว"
    ];

    return random[Math.floor(Math.random() * random.length)];
}

function addNewText() {
    const input = document.getElementById("entey"); // ให้ตรงกับ HTML
    const text = input.value.trim();

    if (text === "") return;

    const chat = document.getElementById("chat");

    const user = document.createElement("p");
    user.textContent = "You: " + text;
    chat.appendChild(user);

    input.value = "";

    setTimeout(() => {
        const bot = document.createElement("p");
        bot.textContent = "User: " + getReply(text);
        chat.appendChild(bot);

        chat.scrollTop = chat.scrollHeight;
    }, 500);
}

function kk() {
    addNewText();
  }
</script>
